# Hostnames here get their own shard (md5(host) % num_shards). Anything else
# under the same eTLD+1 falls back to the eTLD+1 key plus any matching
# override in ingest.yaml::domain_overrides. Use scripts/show_subdomain_counts.py
# to pick candidates.
split_subdomains:
  - developers.facebook.com
  - research.facebook.com
  - tech.facebook.com
  - work.facebook.com

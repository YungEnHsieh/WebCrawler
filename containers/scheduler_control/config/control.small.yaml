offerer:
  id_start: 0
  id_end: 0
  queue_dir_template: "/data/ipc/url_queue/crawler_{id:02d}"
  stats_dir: "/data/ipc/stats"
  total_shards: 256
  shards_per_offerer: 256
  scan_interval_sec: 30
  low_watermark_batches: 2
  batch_size: 64
  per_shard_select_cap: 256

postgres:
  dsn: "postgresql+psycopg2://crawler:crawler@postgres:5432/crawlerdb"

accounting:
  total_shards: 256
  event_retention_days: 90
  batch_size: 500
  run_hour_utc: 3
  run_minute_utc: 0
  check_interval_sec: 3600
  catch_up_on_start: true

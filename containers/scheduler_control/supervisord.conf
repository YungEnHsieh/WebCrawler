[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[unix_http_server]
file=/tmp/supervisor.sock

[program:offerer]
directory=/app
process_name=%(program_name)s_%(process_num)02d
command=python -m containers.scheduler_control.offerer.main --config %(ENV_SCHEDULER_CONTROL_CONFIG)s --offerer-id %(process_num)d
numprocs=%(ENV_SCHEDULER_CONTROL_OFFERER_PROCS)s
numprocs_start=0
environment=PYTHONPATH="/app"
autostart=true
autorestart=true
startretries=20
stopsignal=TERM
stopwaitsecs=5
killasgroup=true
stopasgroup=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:accounting_rolloff]
directory=/app
command=python -m containers.scheduler_control.accounting.main --config %(ENV_SCHEDULER_CONTROL_CONFIG)s
environment=PYTHONPATH="/app"
autostart=true
autorestart=true
startretries=20
stopsignal=TERM
stopwaitsecs=5
killasgroup=true
stopasgroup=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

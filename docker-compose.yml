name: ${COMPOSE_PROJECT_NAME:-webcrawler}

services:
  postgres:
    image: postgres:16
    command: >
      -c max_connections=500
      -c max_wal_size=20GB
      -c checkpoint_timeout=15min
    restart: unless-stopped
    environment:
      - POSTGRES_USER=crawler
      - POSTGRES_PASSWORD=crawler
      - POSTGRES_DB=crawlerdb
    volumes:
      - ${POSTGRES_HOST_DIR:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U crawler -d crawlerdb'"]
      interval: 600s
      timeout: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  scheduler_control:
    build:
      context: .
      dockerfile: containers/scheduler_control/Dockerfile
    init: true
    restart: unless-stopped
    volumes:
      - ./:/app
      - ${IPC_HOST_DIR:-./data/ipc}:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  scheduler_ingest:
    build:
      context: .
      dockerfile: containers/scheduler_ingest/Dockerfile
    init: true
    restart: unless-stopped
    volumes:
      - ./:/app
      - ${IPC_HOST_DIR:-./data/ipc}:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  crawler:
    build:
      context: .
      dockerfile: containers/crawler/Dockerfile
    init: true
    environment:
      CRAWLER_USE_AUTOTHROTTLE: ${CRAWLER_USE_AUTOTHROTTLE:-true}
      CRAWLER_CONCURRENT_REQUESTS: ${CRAWLER_CONCURRENT_REQUESTS:-128}
      CRAWLER_CONCURRENT_REQUESTS_PER_DOMAIN: ${CRAWLER_CONCURRENT_REQUESTS_PER_DOMAIN:-8}
      CRAWLER_DOWNLOAD_DELAY: ${CRAWLER_DOWNLOAD_DELAY:-0.25}
      CRAWLER_AUTOTHROTTLE_START_DELAY: ${CRAWLER_AUTOTHROTTLE_START_DELAY:-1.0}
      CRAWLER_AUTOTHROTTLE_MAX_DELAY: ${CRAWLER_AUTOTHROTTLE_MAX_DELAY:-15.0}
      CRAWLER_AUTOTHROTTLE_TARGET_CONCURRENCY: ${CRAWLER_AUTOTHROTTLE_TARGET_CONCURRENCY:-2.0}
      CRAWLER_AUTOTHROTTLE_DEBUG: ${CRAWLER_AUTOTHROTTLE_DEBUG:-false}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    volumes:
      - ./:/app
      - ${IPC_HOST_DIR:-./data/ipc}:/data/ipc
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
